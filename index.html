<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Xu Resume</title>
<style>
  body {
    margin: 0;
    padding: 40px 20px;
    font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    color: #1f2937;
    background: #f5f7fb;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border: 1px solid #d8e0ea;
    border-radius: 14px;
    padding: 32px;
    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  }
  h1 {
    margin: 0 0 8px;
    color: #1a3a5c;
    font-size: 2rem;
  }
  p {
    margin: 0 0 18px;
    color: #4b5563;
    line-height: 1.7;
  }
  .links {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  a {
    display: block;
    padding: 16px 18px;
    border: 1px solid #d8e0ea;
    border-radius: 10px;
    color: #1a3a5c;
    text-decoration: none;
    background: #fbfdff;
    font-weight: 600;
  }
  a span {
    display: block;
    margin-top: 6px;
    color: #6b7280;
    font-size: 0.92rem;
    font-weight: 400;
  }
  @media (max-width: 700px) {
    .links { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Alex Xu Resume</h1>
    <p>Original layout version, split from the source resume into separate English and Chinese HTML/PDF files.</p>
    <div class="links">
      <a href="./resume-en.html">English HTML<span>Original English layout</span></a>
      <a href="./resume-zh.html">中文 HTML<span>原版中文排版</span></a>
      <a href="./pdf/Alex-Xu-Resume-EN.pdf">English PDF<span>One-page export</span></a>
      <a href="./pdf/Alex-Xu-Resume-ZH.pdf">中文 PDF<span>单页导出版</span></a>
    </div>
  </div>
</body>
</html>
